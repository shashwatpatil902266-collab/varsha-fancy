<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled - Varsha Fancy Store</title>
  <link rel="stylesheet" href="css/index.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; background-color: var(--color-bg); }
    .cancel-card { background: var(--color-surface); padding: var(--space-8); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); max-width: 400px; border-top: 4px solid var(--color-error); }
  </style>
</head>
<body>
  <div class="cancel-card">
    <h1 style="color: var(--color-error); margin-bottom: var(--space-4);">Payment Cancelled</h1>
    <p style="color: var(--color-text-secondary); margin-bottom: var(--space-6);">Your checkout process was interrupted. Your cart is still saved if you want to try again.</p>
    <a href="/cart.html" class="btn btn-primary">Return to Cart</a>
  </div>
</body>
</html>
