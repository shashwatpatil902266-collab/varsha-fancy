<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - Varsha Fancy Store</title>
  <link rel="stylesheet" href="css/index.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; background-color: var(--color-bg); }
    .success-card { background: var(--color-surface); padding: var(--space-8); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); max-width: 400px; }
  </style>
</head>
<body>
  <div class="success-card">
    <h1 style="color: green; margin-bottom: var(--space-4);">Payment Successful! 🎉</h1>
    <p style="color: var(--color-text-secondary); margin-bottom: var(--space-6);">Thank you for your purchase. Your order is being processed and you will receive a confirmation shortly.</p>
    <a href="/" class="btn btn-primary" onclick="localStorage.removeItem('varsha_cart')">Return to Store</a>
  </div>
</body>
</html>
